name: Compile changelogs

on:
  schedule:
  - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  compile:
    name: "Compile changelogs"
    runs-on: ubuntu-latest
    concurrency:
      group: changelog-compile-master
      cancel-in-progress: false
    steps:
      - name: Detect auth mode
        id: auth-mode
        env:
          APP_ID: ${{ secrets.APP_ID }}
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: |
          if [ -n "$APP_ID" ] && [ -n "$APP_PRIVATE_KEY" ]; then
            echo "use_app=true" >> "$GITHUB_OUTPUT"
          else
            echo "use_app=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate App Token
        id: app-token-generation
        if: steps.auth-mode.outputs.use_app == 'true'
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: "Setup python"
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'
      - name: "Install deps"
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml
      - name: "Checkout"
        uses: actions/checkout@v3
        with:
          ref: master
          fetch-depth: 0
          token: ${{ steps.app-token-generation.outputs.token || github.token }}
      - name: "Compile"
        run: |
          python .github/ss13_genchangelog.py html/changelogs
      - name: Commit
        id: commit-changelog
        env:
          USE_APP: ${{ steps.auth-mode.outputs.use_app }}
          APP_PUBLIC_ID: ${{ secrets.APP_PUBLIC_ID }}
          APP_PUBLIC_NAME: ${{ secrets.APP_PUBLIC_NAME }}
        run: |
          if git diff --quiet -- html/changelogs; then
            echo "committed=false" >> "$GITHUB_OUTPUT"
            echo "No changelog changes to commit."
            exit 0
          fi

          if [ "$USE_APP" = "true" ] && [ -n "$APP_PUBLIC_ID" ] && [ -n "$APP_PUBLIC_NAME" ]; then
            git config --local user.email "${APP_PUBLIC_ID}+${APP_PUBLIC_NAME}[bot]@users.noreply.github.com"
            git config --local user.name "${APP_PUBLIC_NAME}[bot]"
          else
            git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git config --local user.name "github-actions[bot]"
          fi

          git add html/changelogs
          git commit -m "Automatic changelog compile [ci skip]"
          echo "committed=true" >> "$GITHUB_OUTPUT"
      - name: "Push"
        if: steps.commit-changelog.outputs.committed == 'true'
        run: |
          git push origin HEAD:master
